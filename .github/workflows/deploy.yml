name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy
        run: |
          curl -fsSL \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
