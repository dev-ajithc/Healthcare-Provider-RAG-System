services:
  - type: web
    name: provider-rag-api
    env: python
    region: oregon
    plan: starter
    buildCommand: >
      pip install -r requirements.txt &&
      python -m spacy download en_core_web_sm &&
      alembic upgrade head
    startCommand: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 2
      --bind 0.0.0.0:$PORT
      --timeout 120
      --access-logfile -
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_PROJECT
        value: "healthcare-provider-rag"
      - key: APP_ENV
        value: "production"
      - key: LOG_LEVEL
        value: "INFO"
      - key: APP_VERSION
        value: "1.0.0"
      - key: ADMIN_KEY
        generateValue: true
      - key: HYDE_ENABLED
        value: "false"
      - key: QUERY_KILLSWITCH
        value: "false"
      - key: MAX_DAILY_TOKENS
        value: "5000000"
      - key: CACHE_TTL_SECONDS
        value: "86400"
      - key: MAX_SESSION_QUERIES
        value: "50"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: ALLOWED_ORIGINS
        value: '["https://provider-rag-ui.onrender.com"]'
      - key: DATABASE_URL
        fromDatabase:
          name: provider-rag-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: provider-rag-cache
          type: redis
          property: connectionString

  - type: web
    name: provider-rag-ui
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run frontend/streamlit_app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
    envVars:
      - key: APP_ENV
        value: "production"

  - type: redis
    name: provider-rag-cache
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: provider-rag-db
    databaseName: ragdb
    user: rag
    region: oregon
    plan: starter
